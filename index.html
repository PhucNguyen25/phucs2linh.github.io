<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:linear-gradient(135deg,#ffc1da,#ff9ecb);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* ===== CARD ===== */
.card{
width:360px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
border-radius:30px;
padding:30px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
position:relative;
}

/* ===== AVATAR ===== */
.avatar{
width:140px;
height:180px;
border-radius:20px;
object-fit:cover;
margin-bottom:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* ===== DOTS ===== */
.dots{
display:flex;
justify-content:center;
gap:10px;
margin:15px 0;
}

.dot{
width:14px;
height:14px;
border-radius:50%;
border:2px solid #e91e63;
}

.dot.filled{
background:#e91e63;
}

/* ===== KEYPAD ===== */
.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:15px;
}

.key{
background:rgba(255,255,255,0.6);
border-radius:50%;
height:60px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:#c2185b;
cursor:pointer;
transition:0.2s;
}

.key:active{
transform:scale(0.9);
}

/* ===== SHAKE ===== */
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

.shake{
animation:shake 0.4s;
}

/* ===== MENU ===== */
.menu{
    display:none; /* start hidden */
    /* will be switched to grid via JS when unlocked */
    grid-template-columns:1fr;
    gap:15px;
    margin-top:20px;
    margin-left:auto;
    margin-right:auto;
    width:fit-content;
}

.menu button{
    padding:15px;
    border:none;
    border-radius:25px;
    background:linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,192,203,0.3));
    color:#c2185b;
    font-weight:600;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-size:28px;
    width:240px;
    height:120px;
    gap:8px;
    box-shadow:0 8px 20px rgba(201, 24, 91, 0.15);
    transition:0.3s;
}

.menu button:hover{
    transform:translateY(-5px);
    box-shadow:0 12px 30px rgba(201, 24, 91, 0.25);
    background:linear-gradient(135deg, rgba(255,255,255,1), rgba(255,192,203,0.5));
}


/* ===== MODAL ===== */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.4);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
width:350px;
border-radius:20px;
padding:25px;
position:relative;
text-align:center;
}

.close{
position:absolute;
right:15px;
top:10px;
cursor:pointer;
}

/* TYPEWRITER */
#message{
font-family:'Dancing Script',cursive;
font-size:22px;
color:#c2185b;
min-height:120px;
}

@keyframes spin{
    from{transform:rotate(0)}
    to{transform:rotate(360deg)}
}

/* ===== PHOTO GALLERY ===== */
.photo-gallery{
    text-align:center;
    max-width:100%;
}

.photo-viewer{
    position:relative;
    width:100%;
    height:300px;
    margin-bottom:20px;
    overflow:hidden;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.photo-display{
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    transition:background-image 0.5s ease;
}

.photo-nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.5);
    color:white;
    border:none;
    width:40px;
    height:40px;
    border-radius:50%;
    cursor:pointer;
    font-size:18px;
    transition:0.3s;
}

.photo-nav:hover{
    background:rgba(0,0,0,0.8);
}

.photo-nav.prev{
    left:10px;
}

.photo-nav.next{
    right:10px;
}

.photo-indicators{
    display:flex;
    justify-content:center;
    gap:8px;
    margin:15px 0;
}

.indicator{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#ddd;
    cursor:pointer;
    transition:0.3s;
}

.indicator.active{
    background:#e91e63;
}

.photo-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
    gap:10px;
    margin-top:20px;
    max-height:200px;
    overflow-y:auto;
}

.photo-thumb{
    width:100%;
    height:60px;
    object-fit:cover;
    border-radius:8px;
    cursor:pointer;
    opacity:0.7;
    transition:0.3s;
    border:2px solid transparent;
}

.photo-thumb:hover{
    opacity:1;
}

.photo-thumb.active{
    opacity:1;
    border-color:#e91e63;
}

.photo-counter{
    margin-top:10px;
    color:#666;
    font-weight:500;
}

/* SCENE */

.flower-scene{
position:relative;
height:350px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* ROSE */

.rose{
font-size:90px;
transform:scale(0);
animation:bloom 2s ease forwards;
}

/* BLOOM ANIMATION */

@keyframes bloom{

0%{
transform:scale(0) rotate(-40deg);
opacity:0;
}

60%{
transform:scale(1.3) rotate(10deg);
}

100%{
transform:scale(1);
opacity:1;
}

}

/* PETALS */

.petal{
position:absolute;
top:-20px;
font-size:20px;
opacity:0.8;
animation:fall 6s linear infinite;
}

@keyframes fall{

0%{
transform:translateY(-20px) rotate(0);
opacity:1;
}

100%{
transform:translateY(420px) rotate(360deg);
opacity:0;
}

}

/* HEARTS */

.heart{
position:absolute;
bottom:-30px;
font-size:18px;
animation:floatHeart 5s ease-in-out infinite;
opacity:0.8;
}

@keyframes floatHeart{

0%{
transform:translateY(0) scale(0.8);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-300px) scale(1.3);
opacity:0;
}

}

/* TEXT */

.flower-text{

margin-top:20px;
font-family:'Dancing Script',cursive;
font-size:24px;
color:#c2185b;

animation:fadeIn 3s ease;

}

@keyframes fadeIn{

0%{
opacity:0;
transform:translateY(20px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

</style>
</head>

<body>

<div class="card" id="lockScreen">

<img src="g3.jpg" class="avatar">

<div class="dots">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<div class="keypad">
<div class="key">1</div>
<div class="key">2</div>
<div class="key">3</div>
<div class="key">4</div>
<div class="key">5</div>
<div class="key">6</div>
<div class="key">7</div>
<div class="key">8</div>
<div class="key">9</div>
<div></div>
<div class="key">0</div>
<div class="key" id="delete">⌫</div>
</div>

<div class="menu" id="menu">
    <button onclick="openMusic()">🎵 Music</button>
    <button onclick="openCard()">💌 Leter</button>
    <button onclick="openFlower()">🌹 Gift</button>
    <button onclick="openPhoto()">📷 Photo</button>
</div>

</div>

<!-- PERSISTENT AUDIO PLAYER (không bị xoá khi đổi menu) -->
<audio id="persistentPlayer" style="display:none;"></audio>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">✖</span>
<div id="modal-body"></div>
</div>
</div>

<script>

const correctPass="0412";
let input="";

const dots=document.querySelectorAll(".dot");
const keys=document.querySelectorAll(".key");
const lockScreen=document.getElementById("lockScreen");
const menu=document.getElementById("menu");

keys.forEach(key=>{
key.addEventListener("click",()=>{
if(key.id==="delete"){
input=input.slice(0,-1);
updateDots();
return;
}

if(input.length<4){
input+=key.textContent;
updateDots();
}

if(input.length===4){
checkPass();
}
});
});

function updateDots(){
dots.forEach((dot,index)=>{
dot.classList.toggle("filled",index<input.length);
});
}

function checkPass(){
    // keep menu hidden unless passcode correct
    menu.style.display = "none";

    if(input===correctPass){
        // unlock: show menu and hide keypad/dots/avatar
        // use grid display for app-like layout
        menu.style.display = "grid";
        const keypad = document.querySelector(".keypad");
        const dots = document.querySelector(".dots");
        const avatar = document.querySelector(".avatar");
        if(keypad) keypad.style.display = "none";
        if(dots) dots.style.display = "none";
        if(avatar) avatar.style.display = "none";
        // change background to elegant gradient
        lockScreen.style.background = "linear-gradient(135deg, #ffd6e8 0%, #ffe4f0 50%, #fff0f5 100%)";
        lockScreen.style.boxShadow = "inset 0 0 30px rgba(255, 105, 180, 0.1)";
    }else{
        lockScreen.classList.add("shake");
        setTimeout(()=>{
            lockScreen.classList.remove("shake");
            input="";
            updateDots();
        },400);
    }
}

/* ===== THIỆP ===== */
function openCard(){
openModal('<div id="message"></div>');
typeWriter("Gửi em – người con gái anh yêu 💖\n\nChúc em một ngày 8/3 thật nhiều niềm vui,\nluôn xinh đẹp, hạnh phúc và rạng rỡ như nụ cười của em.\nCảm ơn em đã đến và làm cuộc sống của anh ý nghĩa hơn. ❤️");
}

function typeWriter(text){
let i=0;
const speed=50;
const messageDiv=document.getElementById("message");
messageDiv.innerHTML="";
function typing(){
if(i<text.length){
messageDiv.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,speed);
}
}
typing();
}

/* ===== HOA ===== */
function openFlower(){

let petals="";
let hearts="";

for(let i=0;i<15;i++){
petals += `<div class="petal" style="
left:${Math.random()*100}%;
animation-delay:${Math.random()*4}s;
">🌸</div>`;
}

for(let i=0;i<10;i++){
hearts += `<div class="heart" style="
left:${Math.random()*100}%;
animation-delay:${Math.random()*3}s;
">❤️</div>`;
}

openModal(`
<div class="flower-scene">

<div class="rose">🌹</div>

<div class="petals">
${petals}
</div>

<div class="hearts">
${hearts}
</div>

<p class="flower-text">
Tặng em bông hoa này ❤️
</p>

</div>
`);

}

/* ===== CẬP NHẬT GIAO DIỆN NHẠC ===== */
function updateMusicUI(){
    const persistentPlayer = document.getElementById('persistentPlayer');
    const playlist = window.musicPlaylist || [];
    
    // Cập nhật tên bài hát
    const trackName = document.getElementById('track-name');
    if(persistentPlayer.src && playlist.length > 0){
        // lấy phần cuối của URL và giải mã
        let currentSrc = persistentPlayer.src.split('/').pop() || '';
        try {
            currentSrc = decodeURIComponent(currentSrc);
        } catch(e) {
            // nếu decode thất bại thì giữ nguyên
        }
        const currentIndex = playlist.findIndex(song => song === currentSrc);
        if(currentIndex !== -1){
            if(trackName) trackName.textContent = playlist[currentIndex];
            window.currentTrackIndex = currentIndex;
            
            // Highlight bài đang phát
            document.querySelectorAll('.playlist-item').forEach((item, i) => {
                if(i === currentIndex){
                    item.style.background = 'rgba(233, 30, 99, 0.4)';
                    item.style.fontWeight = 'bold';
                } else {
                    item.style.background = 'rgba(255,255,255,0.3)';
                    item.style.fontWeight = 'normal';
                }
            });
        } else {
            if(trackName) trackName.textContent = 'Chưa chọn bài nào';
        }
    } else {
        if(trackName) trackName.textContent = 'Chưa chọn bài nào';
    }
    
    // Cập nhật nút play/pause
    const playBtn = document.querySelector('button[onclick="togglePlayPause()"]');
    if(playBtn){
        playBtn.textContent = persistentPlayer.paused ? '▶ Play' : '⏸ Pause';
    }
}

/* ===== NHẠC ===== */
function openMusic(){
    const playlist = [
        'Phép Màu',
        'Một Đời',
        'Một Nhà',
        'Không Sao Mà Em Đây Rồi',
        'Có Nhau Trọn Đời',
        'Chỉ Cần Có Nhau',
        'Ta Là Của Nhau',
        'Từng Ngày Yêu Em',
        'Yêu Em Rất Nhiều'
    ];
    
    let currentTrack = window.currentTrackIndex || 0;
    const persistentPlayer = document.getElementById('persistentPlayer');
    
    // Lưu globally để updateMusicUI() có thể truy cập
    window.musicPlaylist = playlist;
    window.currentTrackIndex = currentTrack;
    
    const playlistHtml = playlist.map((song, index) => 
        `<div class="playlist-item" data-index="${index}" style="padding:10px; cursor:pointer; border-radius:8px; margin:5px 0; background:rgba(255,255,255,0.3); transition:0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.5)'" onmouseout="this.style.background='rgba(255,255,255,0.3)'" onclick="playSong(${index})">${index+1}. ${song}</div>`
    ).join('');
    
    const musicHtml = `
        <h3>Nghe nhạc 🎶</h3>
        <div id="now-playing" style="font-weight:500; color:#c2185b; margin-bottom:10px;">Bây giờ phát: <span id="track-name">Chưa chọn bài nào</span></div>
        <div id="progress-container" style="width:100%; margin-bottom:15px;">
            <input type="range" id="progress-bar" min="0" max="100" value="0" style="width:100%; cursor:pointer; height:6px;">
        </div>
        <div id="audio-controls" style="width:100%; margin-bottom:15px; display:flex; justify-content:center; gap:15px;">
            <button onclick="playPrevTrack()" style="padding:8px 12px; border:none; border-radius:5px; background:#e91e63; color:white; cursor:pointer; font-weight:bold;">⏮</button>
            <button onclick="togglePlayPause()" style="padding:8px 15px; border:none; border-radius:5px; background:#e91e63; color:white; cursor:pointer; font-weight:bold;">▶ Play</button>
            <button onclick="playNextTrack()" style="padding:8px 12px; border:none; border-radius:5px; background:#e91e63; color:white; cursor:pointer; font-weight:bold;">⏭</button>
        </div>
        <h4 style="margin-top:15px; margin-bottom:10px;">Danh sách nhạc:</h4>
        <div style="max-height:250px; overflow-y:auto;">
            ${playlistHtml}
        </div>
    `;
    
    openModal(musicHtml);
    
    // Make playSong function available globally
    window.playSong = function(index){
        currentTrack = index;
        window.currentTrackIndex = index;
        const trackName = document.getElementById('track-name');
        persistentPlayer.src = 'music/' + playlist[index];
        if(trackName) trackName.textContent = playlist[index];
        persistentPlayer.play();
        
        // Cập nhật nút play/pause
        const playBtn = document.querySelector('button[onclick="togglePlayPause()"]');
        if(playBtn) playBtn.textContent = '⏸ Pause';
        
        // Update highlight
        document.querySelectorAll('.playlist-item').forEach((item, i) => {
            if(i === index){
                item.style.background = 'rgba(233, 30, 99, 0.4)';
                item.style.fontWeight = 'bold';
            } else {
                item.style.background = 'rgba(255,255,255,0.3)';
                item.style.fontWeight = 'normal';
            }
        });
    };
    
    // Previous track
    window.playPrevTrack = function(){
        const playlist = window.musicPlaylist || [];
        window.currentTrackIndex = (window.currentTrackIndex - 1 + playlist.length) % playlist.length;
        window.playSong(window.currentTrackIndex);
    };
    
    // Toggle play/pause
    window.togglePlayPause = function(){
        const persistentPlayer = document.getElementById('persistentPlayer');
        const playBtn = document.querySelector('button[onclick="togglePlayPause()"]');
        
        if(persistentPlayer.paused){
            persistentPlayer.play();
            if(playBtn) playBtn.textContent = '⏸ Pause';
        } else {
            persistentPlayer.pause();
            if(playBtn) playBtn.textContent = '▶ Play';
        }
    };
    
    // Next track
    window.playNextTrack = function(){
        const playlist = window.musicPlaylist || [];
        window.currentTrackIndex = (window.currentTrackIndex + 1) % playlist.length;
        window.playSong(window.currentTrackIndex);
    };
    
    // Update progress bar
    persistentPlayer.addEventListener('timeupdate', () => {
        const progressBar = document.getElementById('progress-bar');
        if(progressBar && persistentPlayer.duration){
            progressBar.value = (persistentPlayer.currentTime / persistentPlayer.duration) * 100;
        }
    });
    
    // Seek on progress bar click
    const progressBar = document.getElementById('progress-bar');
    if(progressBar){
        progressBar.addEventListener('click', (e) => {
            const percent = e.offsetX / progressBar.offsetWidth;
            persistentPlayer.currentTime = percent * persistentPlayer.duration;
        });
    }
    
    // Auto play next track when current track ends
    persistentPlayer.addEventListener('ended', () => {
        const playlist = window.musicPlaylist || [];
        window.currentTrackIndex = (window.currentTrackIndex + 1) % playlist.length;
        window.playSong(window.currentTrackIndex);
    });
    
    // Cập nhật giao diện theo trạng thái hiện tại của nhạc
    updateMusicUI();
    
    // Không tự động phát nhạc, để người dùng chọn bài từ danh sách
}

/* ===== ẢNH ===== */
function openPhoto(){
    const images = [
        'images/14.jpg',
        'images/11.jpg',
        'images/19.jpg',
        'images/12.jpg',
        'images/13.jpg',
        'images/15.jpg',
        'images/16.jpg',
        'images/17.jpg',
        'images/18.jpg',
    ];
    
    let currentIndex = 0;
    
    const indicatorsHtml = images.map((_, i) => 
        `<div class="indicator ${i === 0 ? 'active' : ''}" onclick="changePhoto(${i})"></div>`
    ).join('');
    
    const thumbsHtml = images.map((src, i) => 
        `<img src="${src}" class="photo-thumb ${i === 0 ? 'active' : ''}" onclick="changePhoto(${i})">`
    ).join('');
    
    const photoHtml = `
        <h3>Photo Gallery📸</h3>
        <div class="photo-gallery">
            <div class="photo-viewer">
                <div class="photo-display" id="photoDisplay" style="background-image:url('${images[0]}')"></div>
                <button class="photo-nav prev" onclick="prevPhoto()">‹</button>
                <button class="photo-nav next" onclick="nextPhoto()">›</button>
            </div>
            <div class="photo-indicators">
                ${indicatorsHtml}
            </div>
            <div class="photo-grid">
                ${thumbsHtml}
            </div>
            <div class="photo-counter" id="photoCounter">1 / ${images.length}</div>
        </div>
    `;
    
    openModal(photoHtml);
    
    // Make functions available globally
    window.currentPhotoIndex = 0;
    window.photoImages = images;
    
    window.changePhoto = function(index){
        currentIndex = index;
        window.currentPhotoIndex = index;
        const display = document.getElementById('photoDisplay');
        const counter = document.getElementById('photoCounter');
        const indicators = document.querySelectorAll('.indicator');
        const thumbs = document.querySelectorAll('.photo-thumb');
        
        display.style.backgroundImage = `url('${images[index]}')`;
        counter.textContent = `${index + 1} / ${images.length}`;
        
        indicators.forEach((ind, i) => {
            ind.classList.toggle('active', i === index);
        });
        
        thumbs.forEach((thumb, i) => {
            thumb.classList.toggle('active', i === index);
        });
    };
    
    window.nextPhoto = function(){
        const nextIndex = (window.currentPhotoIndex + 1) % images.length;
        window.changePhoto(nextIndex);
    };
    
    window.prevPhoto = function(){
        const prevIndex = (window.currentPhotoIndex - 1 + images.length) % images.length;
        window.changePhoto(prevIndex);
    };
    
    // Auto slideshow
    window.photoInterval = setInterval(() => {
        window.nextPhoto();
    }, 3000);
}

function openModal(content){
document.getElementById("modal").style.display="flex";
document.getElementById("modal-body").innerHTML=content;
}

function closeModal(){
    document.getElementById("modal").style.display="none";
    // stop slideshow if running (nhưng KHÔNG dừng nhạc)
    if(typeof galleryInterval !== 'undefined'){
        clearInterval(galleryInterval);
        galleryInterval = undefined;
    }
    if(typeof window.photoInterval !== 'undefined'){
        clearInterval(window.photoInterval);
        window.photoInterval = undefined;
    }
    // Không dừng persistentPlayer - để nhạc tiếp tục phát
}

</script>
</body>
</html>
